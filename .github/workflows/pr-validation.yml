name: Strict PR Validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR rules
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            let errors = [];

            // ✅ ONLY REQUIRED RULE: Issue linking
            const issueRegex = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i;
            if (!issueRegex.test(body)) {
              errors.push("❌ You must link an issue using: Closes #issue_number");
            }

            // Optional but useful: prevent empty PRs
            if (body.trim().length < 20) {
              errors.push("❌ PR description is too short. Add proper details.");
            }

            if (errors.length > 0) {
              core.setFailed(errors.join("\n"));
            }
