name: PR Validation

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr:
    runs-on: ubuntu-latest
    name: Validate Issue Link

    steps:
      - name: Validate PR issue link
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const prNumber = pr.number;

            console.log(`Validating PR #${prNumber}`);
            console.log(`PR Body:\n${body}`);

            // Check for issue linking
            const issueRegex = /(close[sd]?|fix(e[sd])?|resolve[sd]?|relates to|ref)\s+#\d+/i;
            const hasIssue = issueRegex.test(body);

            if (!hasIssue) {
              console.log('❌ No issue link found. Closing PR.');
              
              // Post explanation comment
              const message = `## ❌ PR Missing Issue Link\n\nPlease add an issue link to your PR description using one of these formats:\n\n\`\`\`\nCloses #123\nFixes #456\nResolves #789\n\`\`\`\n\nThis PR will be automatically closed.`;
              
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: message
              });

              // Add labels
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['status: invalid', 'needs: issue link', 'type: process']
                });
                console.log('✅ Labels added successfully');
              } catch (e) {
                console.error('Could not add labels:', e.message);
              }

              // Close the PR
              try {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  state: "closed"
                });
                console.log('✅ PR closed successfully');
              } catch (e) {
                console.error('Could not close PR:', e.message);
                core.setFailed(`Failed to close PR: ${e.message}`);
              }
            } else {
              console.log('✅ PR has valid issue link!');
              
              // Add labels for valid PR
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['status: needs review']
                });
                console.log('✅ Review label added');
              } catch (e) {
                console.error('Could not add label:', e.message);
              }
            }
