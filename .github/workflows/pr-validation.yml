name: PR Validation & Quality Checks

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate-pr-content:
    runs-on: ubuntu-latest
    name: Validate PR Content

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate PR requirements
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = pr.title || "";

            let errors = [];
            let warnings = [];

            // Check for image
            const imageRegex = /!\[.*?\]\(.*?\)/;
            if (!imageRegex.test(body)) {
              errors.push("❌ **Missing Image**: PR must include at least one image in markdown format: `![alt text](image-url)`");
            }

            // Check for issue linking
            const issueRegex = /(close[sd]?|fix(e[sd])?|resolve[sd]?|relates to|ref)\s+#\d+/i;
            if (!issueRegex.test(body)) {
              errors.push("❌ **Missing Issue Link**: PR must reference an issue using: `Closes #123`, `Fixes #456`, or `Relates to #789`");
            }

            // Check for meaningful description
            const descriptionLength = body.trim().length;
            if (descriptionLength < 20) {
              errors.push("❌ **Insufficient Description**: PR description must be at least 20 characters long. Please provide a meaningful description of your changes.");
            }

            // Check title length
            if (title.length < 10) {
              warnings.push("⚠️ **Short Title**: Consider using a more descriptive title (at least 10 characters)");
            }

            // Check for conventional commit prefix
            const conventionalRegex = /^(feat|fix|docs|style|refactor|perf|test|chore|ci|revert)(\(.+\))?:/;
            if (!conventionalRegex.test(title)) {
              warnings.push("⚠️ **Commit Convention**: Consider using conventional commits format: `feat:`, `fix:`, `docs:`, etc.");
            }

            // Prepare feedback message
            let message = "## PR Validation Results\n\n";

            if (errors.length === 0 && warnings.length === 0) {
              message += "✅ **All checks passed!** Your PR meets all requirements.\n";
            } else {
              if (errors.length > 0) {
                message += "### 🔴 Required Changes\n";
                message += errors.join("\n") + "\n\n";
              }
              if (warnings.length > 0) {
                message += "### 🟡 Suggestions\n";
                message += warnings.join("\n") + "\n\n";
              }
            }

            message += "---\n";
            message += "📝 **Need help?** Check our [CONTRIBUTING.md](../../CONTRIBUTING.md) guide.\n";

            // Post comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: message
            });

            // Fail if critical errors exist
            if (errors.length > 0) {
              core.setFailed(`PR Validation Failed: ${errors.length} requirement(s) not met`);
            }

  check-file-changes:
    runs-on: ubuntu-latest
    name: Check File Changes
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check file count and types
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const baseRef = pr.base.sha;
            const headRef = pr.head.sha;

            // Get changed files
            const response = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const files = response.data;
            const fileCount = files.length;
            const fileThreshold = 50; // Warning threshold

            let feedback = `📊 **Files Changed**: ${fileCount} file(s)\n\n`;
            let warnings = [];

            if (fileCount > fileThreshold) {
              warnings.push(`⚠️ This PR modifies ${fileCount} files (threshold: ${fileThreshold}). Consider breaking it into smaller PRs for easier review.`);
            }

            // Categorize changed files
            const categories = {
              frontend: { pattern: /^src\/(components|pages|assets|styles)\//, count: 0 },
              backend: { pattern: /^(api|server|functions)\//, count: 0 },
              docs: { pattern: /\.(md|txt)$/, count: 0 },
              config: { pattern: /\.(json|yml|yaml|config)$/, count: 0 },
              tests: { pattern: /\.(test|spec)\.(ts|js|tsx|jsx)$/, count: 0 }
            };

            files.forEach(file => {
              for (const [category, config] of Object.entries(categories)) {
                if (config.pattern.test(file.filename)) {
                  config.count++;
                }
              }
            });

            feedback += "**Files by category:**\n";
            for (const [category, config] of Object.entries(categories)) {
              if (config.count > 0) {
                feedback += `- ${category}: ${config.count}\n`;
              }
            }

            if (warnings.length > 0) {
              feedback += "\n### ⚠️ Suggestions\n";
              feedback += warnings.join("\n");
            }

            console.log(feedback);

  detect-secrets:
    runs-on: ubuntu-latest
    name: Detect Secrets (TruffleHog)
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.pull_request.base.sha }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  commit-message-lint:
    runs-on: ubuntu-latest
    name: Lint Commit Messages

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate commit messages
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const conventionalCommitRegex = /^(feat|fix|docs|style|refactor|perf|test|chore|ci|revert)(\(.+\))?!?:\s.+/;
            
            // Get commits in PR
            const commits = await github.rest.pulls.listCommits({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            let invalidCommits = [];
            commits.data.forEach((commit, index) => {
              const message = commit.commit.message.split('\n')[0];
              if (!conventionalCommitRegex.test(message)) {
                invalidCommits.push({
                  sha: commit.sha.substring(0, 7),
                  message: message
                });
              }
            });

            if (invalidCommits.length > 0) {
              let feedback = "### 🔴 Commit Message Format Issues\n\n";
              feedback += "Some commit messages don't follow the conventional commit format:\n\n";
              
              invalidCommits.forEach(commit => {
                feedback += `- \`${commit.sha}\`: "${commit.message}"\n`;
              });

              feedback += "\n**Expected format**: `type(scope): description`\n";
              feedback += "**Valid types**: feat, fix, docs, style, refactor, perf, test, chore, ci, revert\n\n";
              feedback += "Example: `feat(auth): add two-factor authentication`\n";

              console.log(feedback);
            }
