name: PR Rules Enforcement

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR content
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            // Check for image
            const imageRegex = /!\[.*\]\(.*\)/;
            if (!imageRegex.test(body)) {
              core.setFailed("❌ You must add an image using ![alt](url)");
            }

            // Check for issue linking
            const issueRegex = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i;
            if (!issueRegex.test(body)) {
              core.setFailed("❌ You must write: Closes #issue_number");
            }

      - name: Add labels automatically
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || "").toLowerCase();
            const title = (pr.title || "").toLowerCase();

            let labels = [];

            if (title.includes("fix") || body.includes("bug")) {
              labels.push("bug");
            }

            if (title.includes("feat") || body.includes("feature")) {
              labels.push("enhancement");
            }

            if (body.includes("doc")) {
              labels.push("documentation");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
            }
