
name: PR Rules Enforcement

permissions:
  contents: write
  pull-requests: write

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR content and close if invalid
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";

            // Check for image
            const imageRegex = /!\[.*\]\(.*\)/;
            // Check for issue linking
            const issueRegex = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i;

            let failed = false;
            let messages = [];
            if (!imageRegex.test(body)) {
              messages.push("❌ You must add an image using ![alt](url)");
              failed = true;
            }
            if (!issueRegex.test(body)) {
              messages.push("❌ You must write: Closes #issue_number");
              failed = true;
            }

            if (failed) {
              // Comment on the PR with the reason
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: messages.join("\n") + "\n\nThis PR does not meet the required guidelines and will be closed automatically."
              });
              // Close the PR (works for both issues and PRs)
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                state: "closed"
              });
              core.setFailed(messages.join("\n"));
            }

      - name: Add labels automatically
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || "").toLowerCase();
            const title = (pr.title || "").toLowerCase();

            let labels = [];

            if (title.includes("fix") || body.includes("bug")) {
              labels.push("bug");
            }

            if (title.includes("feat") || body.includes("feature")) {
              labels.push("enhancement");
            }

            if (body.includes("doc")) {
              labels.push("documentation");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: labels
              });
            }
