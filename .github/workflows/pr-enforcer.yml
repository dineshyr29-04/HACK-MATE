name: PR Enforcer (Strict + Reliable)

on:
  pull_request_target:
    types: [opened, edited, reopened]

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Validate, Label, and Control PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = (pr.title || "").toLowerCase();

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = pr.number;

            // 🔍 Extract issue number from PR body
            const match = body.match(/(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#(\d+)/i);
            let issueNumber = match ? parseInt(match[3]) : null;

            let issueExists = false;

            // 🔎 Check if issue exists (real validation)
            if (issueNumber) {
              try {
                const issue = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber
                });

                // Ensure it's actually an ISSUE (not PR)
                if (!issue.data.pull_request) {
                  issueExists = true;
                }
              } catch (err) {
                issueExists = false;
              }
            }

            // 🏷️ Label logic
            let labels = [];

            if (title.includes("fix") || body.toLowerCase().includes("bug")) {
              labels.push("bug");
            }

            if (title.includes("feat") || body.toLowerCase().includes("feature")) {
              labels.push("enhancement");
            }

            if (body.toLowerCase().includes("doc")) {
              labels.push("documentation");
            }

            if (body.toLowerCase().includes("ui")) {
              labels.push("frontend");
            }

            if (body.toLowerCase().includes("api") || body.toLowerCase().includes("database")) {
              labels.push("backend");
            }

            // 🚨 CASE 1: No valid issue → CLOSE PR
            if (!issueExists) {

              labels.push("invalid");

              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: prNumber,
                labels
              });

              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body: "❌ This PR has been closed because it does not reference a valid issue.\n\n👉 Please create or link an issue using:\n`Closes #issue_number`\n\nThen reopen the PR."
              });

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: prNumber,
                state: "closed"
              });

              return;
            }

            // ✅ CASE 2: Valid issue → keep PR open

            labels.push("valid");

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number: prNumber,
              labels
            });

            // 👤 Assign repo owner
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number: prNumber,
              assignees: [owner]
            });

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: prNumber,
              body: "✅ PR is valid and linked to an issue. Labels applied. Ready for review."
            });
