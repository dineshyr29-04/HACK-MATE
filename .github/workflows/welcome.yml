name: Welcome First-Time Contributors

permissions:
  contents: read
  issues: write
  discussions: write

on:
  pull_request:
    types: [opened]
  issues:
    types: [opened]

jobs:
  welcome-pr:
    runs-on: ubuntu-latest
    name: Welcome PR Contributor
    if: github.event_name == 'pull_request'

    steps:
      - name: Welcome new PR contributor
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            // Check if user has previous contributions
            const userPRs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: author,
              per_page: 2
            });

            // Only post if this is their first PR
            if (userPRs.data.length === 1) {
              const welcomeMsg = `🎉 Welcome @${author}! 

Thank you so much for submitting your first pull request to this project! We're excited to have you contribute. 

**A few things to help speed up the review:**

1. **Check the PR template** - Make sure all sections are filled out
2. **Add an image** if your changes affect the UI
3. **Reference any related issues** using \`Closes #123\`
4. **Keep it focused** - One feature or fix per PR is ideal

**Questions?** Check out:
- 📖 [CONTRIBUTING.md](../../CONTRIBUTING.md)
- 💬 [Discussions](../../discussions)
- 📋 [Issues](../../issues)

Looking forward to reviewing your contribution! Happy hacking! 🚀`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                body: welcomeMsg
              });
            }

  welcome-issue:
    runs-on: ubuntu-latest
    name: Welcome Issue Reporter
    if: github.event_name == 'issues'

    steps:
      - name: Welcome new issue reporter
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;

            // Check if user has previous issues
            const userIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'all',
              creator: author,
              per_page: 2
            });

            // Only post if this is their first issue
            if (userIssues.data.length === 1) {
              const welcomeMsg = `👋 Hi @${author}!

Thanks for reporting this issue! We appreciate your feedback.

**To help us investigate faster:**
- ✅ Provide a clear description of the problem
- ✅ Include steps to reproduce (if applicable)
- ✅ Share your environment details (OS, browser, version)
- ✅ Attach screenshots or error logs if relevant

**In the meantime, you can:**
- 📖 Check our [FAQ](../../CONTRIBUTING.md)
- 🔍 Search existing issues to see if this was already reported
- 💬 Join our community [discussions](../../discussions)

We'll get back to you as soon as we can! Thanks! 🙌`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: welcomeMsg
              });
            }

  help-wanted-issues:
    runs-on: ubuntu-latest
    name: Label Help-Wanted Issues
    if: github.event_name == 'issues'

    steps:
      - name: Check and label help-wanted issues
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = (issue.body || "").toLowerCase();
            const title = (issue.title || "").toLowerCase();

            // Detect if this looks like a good first issue
            const firstIssueKeywords = ['good first', 'beginner', 'newbie', 'help wanted', 'documentation', 'easy'];
            const isGoodFirstIssue = firstIssueKeywords.some(keyword => 
              body.includes(keyword) || title.includes(keyword)
            );

            if (isGoodFirstIssue) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ['good-first-issue', 'help-wanted']
              });

              console.log(`Labeled as good-first-issue and help-wanted`);
            }

  stale-management:
    runs-on: ubuntu-latest
    name: Manage Stale Issues
    if: github.event_name == 'issues' && github.event.action == 'opened'

    steps:
      - name: Close stale issues after inactivity
        uses: actions/stale@v8
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          stale-issue-message: |
            👻 This issue has been automatically marked as stale because it hasn't been updated in 30 days. 
            If you believe this is still relevant, please comment to keep it open. Otherwise, it will be closed in 7 days.
          stale-pr-message: |
            👻 This PR has been automatically marked as stale because it hasn't been updated in 14 days.
            If you'd like to continue working on this, please comment or update the PR to keep it open.
          stale-issue-label: 'stale'
          stale-pr-label: 'stale'
          days-before-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,blocked,help-wanted'
          exempt-pr-labels: 'pinned,blocked,in-progress'
