name: Check Issue Assignment Before PR

on:
  pull_request:
    types: [opened, reopened, edited, synchronize]

permissions:
  pull-requests: write
  issues: read
  contents: read

jobs:
  check-assignment:
    name: Verify Author is Assigned to Linked Issue
    runs-on: ubuntu-latest

    steps:
      - name: Check assignment and manage PR
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const prAuthor = pr.user.login;
            const prNumber = pr.number;
            const prBody = pr.body || '';

            console.log(`PR #${prNumber} opened by: ${prAuthor}`);
            console.log(`PR Body:\n${prBody}`);

            // -------------------------------------------------------
            // 1. Extract issue number from "Closes #123" style keywords
            // -------------------------------------------------------
            const closingKeywords = [
              'close', 'closes', 'closed',
              'fix', 'fixes', 'fixed',
              'resolve', 'resolves', 'resolved'
            ];
            const keywordPattern = closingKeywords.join('|');
            const issueRegex = new RegExp(
              `(?:${keywordPattern})\\s+#(\\d+)`,
              'gi'
            );

            const matches = [...prBody.matchAll(issueRegex)];
            const issueNumbers = [...new Set(matches.map(m => parseInt(m[1])))];

            console.log(`Linked issue numbers found: ${issueNumbers}`);

            if (issueNumbers.length === 0) {
              console.log('No linked issues found via closing keywords. Closing PR.');

              // Remove approval label if present
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: 'status: approved to merge'
                });
              } catch (_) { /* label may not exist */ }

              // Add relevant labels
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['status: invalid', 'needs: issue link']
                });
              } catch (e) {
                console.warn('Could not add labels:', e.message);
              }

              // Post explanation comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## ❌ PR Closed — No Linked Issue Found',
                  '',
                  `Hi @${prAuthor}, thank you for your contribution!`,
                  '',
                  'This PR has been **automatically closed** because it does not reference a linked issue using a closing keyword.',
                  '',
                  'Please update the PR description to include one of the following formats:',
                  '',
                  '```',
                  'Closes #<issue-number>',
                  'Fixes #<issue-number>',
                  'Resolves #<issue-number>',
                  '```',
                  '',
                  'Also make sure you are **assigned to the issue** before submitting a PR.',
                  '',
                  'Once you have linked an issue and ensured you are assigned, please reopen this PR or create a new one.',
                  '',
                  '> This check helps us maintain an organised contribution workflow. 🙏'
                ].join('\n')
              });

              // Close the PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed'
              });

              return;
            }

            // -------------------------------------------------------
            // 2. For each linked issue, verify author is assigned
            // -------------------------------------------------------
            let allAssigned = true;
            const unassignedIssues = [];

            for (const issueNumber of issueNumbers) {
              console.log(`Checking issue #${issueNumber}...`);

              let issue;
              try {
                const response = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });
                issue = response.data;
              } catch (e) {
                console.error(`Could not fetch issue #${issueNumber}: ${e.message}`);
                unassignedIssues.push(issueNumber);
                allAssigned = false;
                continue;
              }

              const assignees = issue.assignees.map(a => a.login);
              console.log(`Issue #${issueNumber} assignees: ${assignees}`);

              if (!assignees.includes(prAuthor)) {
                console.log(`${prAuthor} is NOT assigned to issue #${issueNumber}`);
                allAssigned = false;
                unassignedIssues.push(issueNumber);
              } else {
                console.log(`${prAuthor} IS assigned to issue #${issueNumber} ✓`);
              }
            }

            // -------------------------------------------------------
            // 3a. Author is NOT assigned → close PR + label + comment
            // -------------------------------------------------------
            if (!allAssigned) {
              console.log('Closing PR due to missing assignment(s).');

              // Remove approval label if present
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  name: 'status: approved to merge'
                });
              } catch (_) { /* label may not exist */ }

              // Add relevant labels
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['status: invalid', 'needs: assignment']
                });
              } catch (e) {
                console.warn('Could not add labels:', e.message);
              }

              const issueList = unassignedIssues.map(n => `#${n}`).join(', ');

              // Post explanation comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: prNumber,
                body: [
                  '## ❌ PR Closed — Assignment Required',
                  '',
                  `Hi @${prAuthor}, thank you for your interest in contributing!`,
                  '',
                  `This PR has been **automatically closed** because you are not assigned to the linked issue(s): **${issueList}**.`,
                  '',
                  '### How to get assigned:',
                  '1. Go to the issue(s) listed above.',
                  '2. Leave a comment like: *"I would like to work on this."*',
                  '3. Wait for a maintainer to assign you.',
                  '4. Once assigned, reopen this PR or create a new one.',
                  '',
                  '### Why do we require this?',
                  'Assignment ensures no two contributors duplicate effort on the same issue.',
                  '',
                  'Thank you for understanding! We look forward to your contribution. 🙏'
                ].join('\n')
              });

              // Close the PR
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
                state: 'closed'
              });

            // -------------------------------------------------------
            // 3b. Author IS assigned → ensure PR is open + label it
            // -------------------------------------------------------
            } else {
              console.log('Author is assigned. Ensuring PR is open.');

              // Reopen if it was closed by this workflow previously
              if (pr.state === 'closed') {
                await github.rest.pulls.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: prNumber,
                  state: 'open'
                });
              }

              // Remove blocking labels if present
              for (const label of ['status: invalid', 'needs: assignment']) {
                try {
                  await github.rest.issues.removeLabel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    name: label
                  });
                } catch (_) { /* label may not exist */ }
              }

              // Add progress label
              try {
                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  labels: ['status: in review']
                });
              } catch (e) {
                console.warn('Could not add label:', e.message);
              }

              console.log('PR is valid. Assignment check passed ✓');
            }
