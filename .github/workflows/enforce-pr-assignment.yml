name: PR Enforcer (Strict)

on:
  pull_request_target:
    types: [opened, edited, reopened]

jobs:
  enforce:
    runs-on: ubuntu-latest

    steps:
      - name: Enforce rules
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || "";
            const title = (pr.title || "").toLowerCase();

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = pr.number;

            // 🔍 Check for issue linking
            const issueRegex = /(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#\d+/i;
            const hasIssue = issueRegex.test(body);

            // ❌ If NO issue → comment + close PR
            if (!hasIssue) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: "❌ This PR has been closed because it does not reference any issue.\n\n👉 Please reopen after adding: `Closes #issue_number`"
              });

              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: issue_number,
                state: "closed"
              });

              return;
            }

            // 🏷️ Auto labeling
            let labels = [];

            if (title.includes("fix") || body.toLowerCase().includes("bug")) {
              labels.push("bug");
            }

            if (title.includes("feat") || body.toLowerCase().includes("feature")) {
              labels.push("enhancement");
            }

            if (body.toLowerCase().includes("doc")) {
              labels.push("documentation");
            }

            if (body.toLowerCase().includes("ui")) {
              labels.push("frontend");
            }

            if (body.toLowerCase().includes("api") || body.toLowerCase().includes("database")) {
              labels.push("backend");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number,
                labels
              });
            }

            // 👤 Auto assign repo owner
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [owner]
            });

            // 💬 Success comment
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: "✅ PR looks good. Issue is linked and labels are applied. Maintainers will review soon."
            });
