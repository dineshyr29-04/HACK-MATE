name: PR Status Checks

permissions:
  contents: read
  pull-requests: write
  checks: read
  statuses: read

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  check-pr-status:
    runs-on: ubuntu-latest
    name: Check All Status Checks

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for all checks
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Get PR status checks
            const statuses = await github.rest.repos.getCombinedStatusForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha
            });

            console.log(`Combined status: ${statuses.data.state}`);
            console.log(`Total status checks: ${statuses.data.statuses.length}`);
            
            statuses.data.statuses.forEach(status => {
              console.log(`- ${status.context}: ${status.state}`);
            });

            if (statuses.data.state !== 'success' && statuses.data.state !== 'pending') {
              console.warn('⚠️ Some checks are not passing');
            }

  enforce-review-requirement:
    runs-on: ubuntu-latest
    name: Check Review Status
    if: github.event.pull_request.draft == false

    steps:
      - name: Check for required approvals
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Get reviews
            const reviews = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const approvals = reviews.data.filter(r => r.state === 'APPROVED').length;
            const changesRequested = reviews.data.filter(r => r.state === 'CHANGES_REQUESTED').length;

            console.log(`Approvals: ${approvals}`);
            console.log(`Changes requested: ${changesRequested}`);

            if (changesRequested > 0 && approvals === 0) {
              core.warning('⚠️ Changes have been requested. Please address them before merging.');
            }

  add-merge-info:
    runs-on: ubuntu-latest
    name: Post Merge Guidelines
    if: github.event.action == 'opened'

    steps:
      - name: Post merge information
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            const mergeInfo = `
## 🚀 Merge Requirements

Before this PR can be merged, the following must be completed:

- ✅ All status checks must pass (CI/CD, tests, linting)
- ✅ At least one approval from a code owner
- ✅ All conversation threads must be resolved
- ✅ No conflicts with the base branch
- ✅ Commit history must be clean (squash or rebase if needed)

### 📋 Status Checks
The following automated checks will run on this PR:
- CodeQL Security Analysis
- Dependency Vulnerability Scans
- Commit Message Linting
- File Change Analysis
- Secret Detection
- Code Formatting & Linting

### 🔍 Reviewers
Reviewers will be automatically assigned based on changed files. You can also request specific reviewers using the PR interface.

### 💡 Tips
- Keep commits focused and atomic
- Write meaningful commit messages
- Update documentation if needed
- Add tests for new features

### ❓ Questions?
- Check the [CONTRIBUTING.md](../../CONTRIBUTING.md) guide
- Read [common issues](../../issues?q=label%3A%22good-first-issue%22)
- Ask in [Discussions](../../discussions)

---
*This is an automated message. It will appear on all PRs.*
`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: mergeInfo
            });
