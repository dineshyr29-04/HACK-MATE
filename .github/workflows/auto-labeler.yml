name: Auto Label + Assign + Comment

on:
  pull_request:
    types: [opened, reopened]

jobs:
  manage-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Label + Assign + Comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = (pr.body || "").toLowerCase();
            const title = (pr.title || "").toLowerCase();

            let labels = [];

            if (title.includes("fix") || body.includes("bug")) {
              labels.push("bug");
            }

            if (title.includes("feat") || body.includes("feature")) {
              labels.push("enhancement");
            }

            if (body.includes("doc")) {
              labels.push("documentation");
            }

            if (body.includes("ui")) {
              labels.push("frontend");
            }

            if (body.includes("api") || body.includes("database")) {
              labels.push("backend");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels
              });
            }

            // Auto assign you (repo owner)
            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [context.repo.owner]
            });

            // Welcome comment
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              body: "👋 Thanks for your PR! Make sure it properly links an issue using `Closes #number`."
            });
