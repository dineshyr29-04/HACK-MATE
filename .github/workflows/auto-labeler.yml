name: Automated Labeling

permissions:
  contents: read
  pull-requests: write
  issues: write

on:
  pull_request:
    types: [opened, edited, synchronize]

jobs:
  label-pr:
    runs-on: ubuntu-latest
    name: Auto-assign Labels

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR based on title and description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = (pr.title || "").toLowerCase();
            const body = (pr.body || "").toLowerCase();
            const labels = new Set();

            // Title-based labels
            if (title.includes("feat") || title.includes("feature") || title.includes("add")) {
              labels.add("enhancement");
            }
            if (title.includes("fix") || title.includes("bug") || title.includes("issue")) {
              labels.add("bug");
            }
            if (title.includes("doc") || title.includes("readme") || title.includes("guide")) {
              labels.add("documentation");
            }
            if (title.includes("refactor") || title.includes("cleanup") || title.includes("style")) {
              labels.add("refactor");
            }
            if (title.includes("perf") || title.includes("performance") || title.includes("optimize")) {
              labels.add("performance");
            }
            if (title.includes("test") || title.includes("spec")) {
              labels.add("testing");
            }
            if (title.includes("security") || title.includes("auth") || title.includes("vulnerability")) {
              labels.add("security");
            }

            // Description-based labels
            if (body.includes("breaking") || body.includes("breaking change")) {
              labels.add("breaking-change");
            }
            if (body.includes("wip") || body.includes("work in progress")) {
              labels.add("WIP");
            }
            if (body.includes("first-time") || body.includes("first time")) {
              labels.add("good-first-issue");
            }

            // Add labels if any were detected
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: Array.from(labels)
              });

              console.log(`Added labels: ${Array.from(labels).join(", ")}`);
            }

  label-by-files:
    runs-on: ubuntu-latest
    name: Label by Changed Files

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get changed files and label
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Get changed files
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            const labels = new Set();
            const changedFiles = files.data.map(f => f.filename);

            // Analyze file paths to determine category
            changedFiles.forEach(file => {
              if (file.match(/^src\/(components|pages|assets|hooks|styles|lib)/i)) {
                labels.add("frontend");
              }
              if (file.match(/^(api|server|functions|backend)/i)) {
                labels.add("backend");
              }
              if (file.match(/\.(md|txt)$/)) {
                labels.add("documentation");
              }
              if (file.match(/\.(test|spec)\.(ts|js|tsx|jsx)$/)) {
                labels.add("testing");
              }
              if (file.match(/^\.github\//)) {
                labels.add("ci/cd");
              }
              if (file.match(/^(package\.json|tsconfig|\.eslintrc|tailwind|postcss)/)) {
                labels.add("configuration");
              }
            });

            // Add labels if any were detected
            if (labels.size > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: Array.from(labels)
              });

              console.log(`Added file-based labels: ${Array.from(labels).join(", ")}`);
            }

  size-label:
    runs-on: ubuntu-latest
    name: Label PR Size

    steps:
      - name: Label PR by size
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            
            // Get changed files
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100
            });

            let additions = 0;
            let deletions = 0;

            files.data.forEach(file => {
              additions += file.additions;
              deletions += file.deletions;
            });

            const totalChanges = additions + deletions;
            let sizeLabel = "";

            if (totalChanges < 100) {
              sizeLabel = "size/XS";
            } else if (totalChanges < 300) {
              sizeLabel = "size/S";
            } else if (totalChanges < 1000) {
              sizeLabel = "size/M";
            } else if (totalChanges < 3000) {
              sizeLabel = "size/L";
            } else {
              sizeLabel = "size/XL";
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              labels: [sizeLabel]
            });

            console.log(`PR size: ${totalChanges} changes (+${additions}/-${deletions}) → ${sizeLabel}`);
