name: Issue Self Assign

on:
  issue_comment:
    types: [created]

jobs:
  assign:
    runs-on: ubuntu-latest

    steps:
      - name: Handle /assign command
        uses: actions/github-script@v7
        with:
          script: |
            const comment = context.payload.comment.body.trim();
            const issue = context.payload.issue;

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = issue.number;

            const commenter = context.payload.comment.user.login;

            // 🔍 Only run if "/assign" is typed
            if (!comment.startsWith("/assign")) {
              return;
            }

            // ❌ Ignore if it's a PR comment (only issues)
            if (issue.pull_request) {
              return;
            }

            // 🔍 Check existing assignees
            const currentAssignees = issue.assignees.map(a => a.login);

            if (currentAssignees.length > 0) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: `❌ This issue is already assigned to @${currentAssignees.join(", ")}. Assignment request denied.`
              });
              return;
            }

            // ✅ Assign the commenter
            await github.rest.issues.addAssignees({
              owner,
              repo,
              issue_number,
              assignees: [commenter]
            });

            // 💬 Confirmation
            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number,
              body: `✅ @${commenter} has been assigned to this issue. Good luck! 🚀`
            });
